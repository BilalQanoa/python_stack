<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <div class="border">
        {% for i in range(row) %}
        <div class="container">
            {% for j in range(col) %}
            {% if (i + j) % 2 == 0 %}
            <div class="box" style="background-color: black;"></div>
            {% else %}
            <div class="box" style="background-color: white;"></div>
            {% endif %}
            {% endfor %}
        </div>
        {% endfor %}
    </div>

</body>
</html>
